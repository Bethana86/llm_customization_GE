<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Enterprise Agent Platform - Customization Factory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- App Container -->
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 21L14.907 18M18 10.5c0-2.62-1.64-4.86-3.95-5.75M9 20h.01M16.5 18.75h.008v.008H16.5v-.008zm0-3h.008v.008H16.5v-.008zm-3-3h.008v.008h-.008v-.008zm-3-3h.008v.008h-.008v-.008zm0-3h.008v.008h-.008v-.008zm0-3h.008v.008h-.008v-.008zm-3 15h.008v.008h-.008v-.008zm0-3h.008v.008h-.008v-.008zm0-3h.008v.008h-.008v-.008z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707.707" />
                    </svg>
                </div>
                <div class="brand-text">
                    <span class="brand-title">Gemini Enterprise</span>
                    <span class="brand-subtitle">Customization Factory</span>
                </div>
            </div>
            
            <nav class="nav-links">
                <button class="nav-btn active" data-view="dashboard" id="nav-dashboard">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="9" rx="1.5" />
                        <rect x="14" y="3" width="7" height="5" rx="1.5" />
                        <rect x="14" y="12" width="7" height="9" rx="1.5" />
                        <rect x="3" y="16" width="7" height="5" rx="1.5" />
                    </svg>
                    <span>Operations Hub</span>
                </button>
                <button class="nav-btn" data-view="datasets" id="nav-datasets">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 22V4c0-.5.2-1 .6-1.4C5 2.2 5.5 2 6 2h12c.5 0 1 .2 1.4.6.4.4.6.9.6 1.4v18M4 6h16M4 12h16M4 18h16" />
                    </svg>
                    <span>Dataset Factory</span>
                </button>
                <button class="nav-btn" data-view="training" id="nav-training">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
                    </svg>
                    <span>Tuning & Distillation</span>
                </button>
                <button class="nav-btn" data-view="playground" id="nav-playground">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
                        <line x1="12" y1="22.08" x2="12" y2="12" />
                    </svg>
                    <span>Prompt Sandbox</span>
                </button>
                <button class="nav-btn" data-view="evaluation" id="nav-evaluation">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 20V10M12 20V4M6 20v-6" />
                    </svg>
                    <span>Evaluation Matrix</span>
                </button>
                <button class="nav-btn" data-view="agents" id="nav-agents">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                    <span>Agent Publisher</span>
                </button>
                <button class="nav-btn" data-view="governance" id="nav-governance">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                    <span>Governance & Auditing</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="connection-status">
                    <span class="status-dot online"></span>
                    <span class="status-text">Platform Connected</span>
                </div>
                <div class="platform-ver">v3.5.2-enterprise</div>
            </div>
        </aside>

        <!-- Main Panel Content -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <div class="header-left">
                    <div class="breadcrumb">
                        <span class="breadcrumb-root">GEMINI AGENT SYSTEM</span>
                        <span class="breadcrumb-separator">/</span>
                        <span class="breadcrumb-current" id="current-view-title">Operations Hub</span>
                    </div>
                </div>
                <div class="header-right">
                    <!-- Global registry status -->
                    <div class="registry-badge">
                        <span class="badge-label">Active Registry:</span>
                        <span class="badge-value">gcp-eu-west4</span>
                    </div>
                    <!-- Workspace indicator -->
                    <div class="workspace-selector">
                        <svg class="w-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
                        </svg>
                        <span class="workspace-name">Corporate_LLM_Shared</span>
                    </div>
                    <!-- Profile avatar mock -->
                    <div class="user-profile">
                        <div class="avatar">AE</div>
                        <div class="profile-details">
                            <span class="profile-name">Admin Engineer</span>
                            <span class="profile-role">Model Cust. Owner</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Workspace Viewport -->
            <section class="viewport-wrapper" id="viewport">
                <!-- Dynamic components render here -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Initializing Customization Factory...</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Global Modals/Notifications -->
    <div id="notifications-container" class="notifications-container"></div>
    <div id="modal-container" class="modal-overlay hidden"></div>

    <!-- App JavaScript Modules -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
